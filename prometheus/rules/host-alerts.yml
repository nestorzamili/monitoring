groups:
  - name: host-and-service-alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: Node exporter cannot be scraped
          description: Prometheus could not scrape node exporter on {{ $labels.instance }} for 45 seconds.

      - alert: DockerHealthCollectorStale
        expr: time() - docker_health_collector_last_run_seconds > 60
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: Docker health collector is stale
          description: The Docker health collector on {{ $labels.instance }} has not updated metrics for more than 60 seconds.

      - alert: DockerContainerMissing
        expr: docker_container_present == 0
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: Target container is missing
          description: Container {{ $labels.service }} has not been found on {{ $labels.instance }} for 45 seconds.

      - alert: DockerContainerNotRunning
        expr: docker_container_present == 1 and docker_container_running == 0
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: Container is not running
          description: Container {{ $labels.service }} has not been running on {{ $labels.instance }} for 45 seconds.

      - alert: DockerContainerUnhealthy
        expr: docker_container_present == 1 and docker_container_running == 1 and docker_container_healthy == 0
        for: 45s
        labels:
          severity: critical
        annotations:
          summary: Docker health check failed
          description: Docker health check for container {{ $labels.service }} has not been healthy on {{ $labels.instance }} for 45 seconds.

      - alert: DockerContainerRestartingTooMuch
        expr: increase(docker_container_restart_count[15m]) >= 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Container is restarting too often
          description: Container {{ $labels.service }} restarted at least 3 times within 15 minutes on {{ $labels.instance }}.

      - alert: HostHighCPUWarning
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{job="node",mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host CPU usage is high
          description: CPU usage on {{ $labels.instance }} has been above 85% for 10 minutes.

      - alert: HostHighCPUCritical
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{job="node",mode="idle"}[5m])) * 100) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Host CPU usage is critically high
          description: CPU usage on {{ $labels.instance }} has been above 95% for 5 minutes.

      - alert: HostMemoryLowWarning
        expr: (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) * 100 < 15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host memory is low
          description: Available memory on {{ $labels.instance }} has been below 15% for 10 minutes.

      - alert: HostMemoryLowCritical
        expr: (node_memory_MemAvailable_bytes{job="node"} / node_memory_MemTotal_bytes{job="node"}) * 100 < 8
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Host memory is critically low
          description: Available memory on {{ $labels.instance }} has been below 8% for 5 minutes.

      - alert: HostLoadHighWarning
        expr: node_load1{job="node"} / count by (instance) (node_cpu_seconds_total{job="node",mode="idle"}) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Host load is high
          description: 1-minute load on {{ $labels.instance }} has been above 1.5x the CPU core count for 10 minutes.

      - alert: HostLoadHighCritical
        expr: node_load1{job="node"} / count by (instance) (node_cpu_seconds_total{job="node",mode="idle"}) > 2
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Host load is critically high
          description: 1-minute load on {{ $labels.instance }} has been above 2x the CPU core count for 5 minutes.

      - alert: DiskLowSpaceWarning
        expr: |
          (
            node_filesystem_avail_bytes{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
            /
            node_filesystem_size_bytes{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
          ) * 100 < 15
          and on (instance, device, mountpoint)
          node_filesystem_readonly{job="node"} == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Disk space is low
          description: Free disk space on mount {{ $labels.mountpoint }} at {{ $labels.instance }} has been below 15% for 15 minutes.

      - alert: DiskLowSpaceCritical
        expr: |
          (
            node_filesystem_avail_bytes{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
            /
            node_filesystem_size_bytes{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
          ) * 100 < 8
          and on (instance, device, mountpoint)
          node_filesystem_readonly{job="node"} == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Disk space is critically low
          description: Free disk space on mount {{ $labels.mountpoint }} at {{ $labels.instance }} has been below 8% for 10 minutes.

      - alert: DiskWillFillSoon
        expr: |
          predict_linear(node_filesystem_avail_bytes{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}[6h], 24 * 3600) < 0
          and on (instance, device, mountpoint)
          node_filesystem_readonly{job="node"} == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: Disk is predicted to fill soon
          description: Mount {{ $labels.mountpoint }} at {{ $labels.instance }} is predicted to run out of space within 24 hours if the current trend continues.

      - alert: InodeLowWarning
        expr: |
          (
            node_filesystem_files_free{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
            /
            node_filesystem_files{job="node",fstype!~"tmpfs|overlay|squashfs|nsfs|ramfs|tracefs"}
          ) * 100 < 10
          and on (instance, device, mountpoint)
          node_filesystem_readonly{job="node"} == 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Inodes are low
          description: Free inodes on mount {{ $labels.mountpoint }} at {{ $labels.instance }} have been below 10% for 15 minutes.

      - alert: FilesystemReadOnly
        expr: node_filesystem_readonly{job="node"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Filesystem is read-only
          description: Mount {{ $labels.mountpoint }} at {{ $labels.instance }} has been read-only for 2 minutes.

      - alert: HostSwapHigh
        expr: |
          (
            1 - (node_memory_SwapFree_bytes{job="node"} / node_memory_SwapTotal_bytes{job="node"})
          ) * 100 > 50
          and node_memory_SwapTotal_bytes{job="node"} > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Swap usage is high
          description: Swap usage on {{ $labels.instance }} has been above 50% for 15 minutes.

      - alert: HostRebooted
        expr: changes(node_boot_time_seconds{job="node"}[15m]) > 0
        for: 0m
        labels:
          severity: info
        annotations:
          summary: Host reboot detected
          description: Host {{ $labels.instance }} rebooted within the last 15 minutes.
